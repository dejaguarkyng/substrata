name: substrata

services:
  postgres:
    image: postgres:16
    container_name: substrata-postgres
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - substrata-postgres-data:/var/lib/postgresql/data
    networks:
      - substrata-private
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  migrate:
    build:
      context: ..
      dockerfile: infra/Dockerfile
      target: api
    container_name: substrata-migrate
    restart: "no"
    env_file:
      - .env.production
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - substrata-private
    command: >
      pnpm --filter @substrata/db exec prisma migrate deploy --schema prisma/schema.prisma

  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile
      target: api
    container_name: substrata-api
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      API_PORT: 4100
      DATABASE_URL: ${DATABASE_URL}
      API_CORS_ORIGIN: ${API_CORS_ORIGIN}
      LOCAL_STORAGE_ROOT: /app/tmp/storage
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:4100:4100"
    volumes:
      - substrata-storage:/app/tmp/storage
    networks:
      - substrata-private

  web:
    build:
      context: ..
      dockerfile: infra/Dockerfile
      target: web
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    container_name: substrata-web
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      PORT: 3100
    depends_on:
      api:
        condition: service_started
    ports:
      - "127.0.0.1:3100:3100"
    networks:
      - substrata-private

networks:
  substrata-private:
    driver: bridge

volumes:
  substrata-postgres-data:
  substrata-storage:
